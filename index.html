<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petstyle | AI 반려견 미용 매칭 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i class="ri-rhythm-line"></i>
                <span>Petstyle</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">홈</a>
                <a href="#" class="nav-link">매거진</a>
                <a href="#" class="nav-link">내 주변 샵</a>
                <button class="auth-btn">로그인</button>
            </div>
            <div class="mobile-menu-btn">
                <i class="ri-menu-line"></i>
            </div>
        </div>
    </nav>

    <main>
        <header class="hero">
            <div class="container">
                <div class="hero-content">
                    <span class="badge fade-in-up">AI 매칭 시스템 출시 🎉</span>
                    <h1 class="fade-in-up delay-1">내 아이에게 딱 맞는<br><span class="gradient-text">프리미엄 미용 스타일링</span></h1>
                    <p class="fade-in-up delay-2">원하는 미용 스타일과 견종만 선택하세요. Petstyle의 AI 알고리즘이 맞춤 전문 미용샵을 1초 만에 찾아드립니다.</p>
                </div>

                <div class="search-panel glass-card fade-in-up delay-3">
                    <div class="search-inputs">
                        <div class="input-group">
                            <label><i class="ri-guide-dog-line"></i> 견종 선택</label>
                            <select id="breed-select">
                                <option value="" disabled selected>견종을 선택하세요</option>
                                <option value="poodle">푸들</option>
                                <option value="pomeranian">포메라니안</option>
                                <option value="bichon">비숑 프리제</option>
                                <option value="maltese">말티즈</option>
                                <option value="retriever">리트리버</option>
                            </select>
                        </div>
                        <div class="input-divider"></div>
                        <div class="input-group">
                            <label><i class="ri-scissors-cut-line"></i> 희망 스타일</label>
                            <select id="style-select">
                                <option value="" disabled selected>스타일을 선택하세요</option>
                                <option value="teddy">테디베어 컷 (귀여움 강조)</option>
                                <option value="lion">라이언 컷 (개성있는 스타일)</option>
                                <option value="summer">썸머 컷 (시원하고 깔끔하게)</option>
                                <option value="hygiene">위생 미용 (기본 관리)</option>
                                <option value="spoing">스포팅 (프리미엄 가위컷)</option>
                            </select>
                        </div>
                        <div class="input-divider"></div>
                        <div class="input-group">
                            <label><i class="ri-map-pin-line"></i> 내 위치</label>
                            <div class="location-display">강남구 논현동 <i class="ri-arrow-down-s-line"></i></div>
                        </div>
                        <button id="search-btn" class="primary-btn glow-effect">AI 매칭 시작</button>
                    </div>
                </div>
            </div>
        </header>

        <section id="ai-loading" class="hidden">
            <div class="container ai-loader-container">
                <div class="ai-orb"></div>
                <h3>최적의 미용샵을 분석 중입니다...</h3>
                <p>견종 특성과 스타일 전문성을 비교하고 있습니다</p>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
        </section>

        <section id="results-section" class="results hidden">
            <div class="container">
                <div class="results-header">
                    <h2>매칭 결과 <span id="results-count" class="accent-text">3</span>건</h2>
                    <div class="filter-pills">
                        <span class="pill active">추천순</span>
                        <span class="pill">거리순</span>
                        <span class="pill">평점순</span>
                        <span class="pill">리뷰많은순</span>
                    </div>
                </div>

                <div class="shop-grid" id="shop-grid">
                    <!-- Shop cards will be inserted here by JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal for Shop Details -->
    <div id="shop-modal" class="modal-overlay hidden">
        <div class="modal glass-card">
            <button class="close-modal"><i class="ri-close-line"></i></button>
            <div class="modal-content" id="modal-content">
                <!-- Modal content injected by JS -->
            </div>
        </div>
    </div>

    <!-- Booking Success Toast -->
    <div id="toast" class="toast hidden">
        <i class="ri-checkbox-circle-fill"></i>
        <div class="toast-content">
            <h4>예약 요청 완료!</h4>
            <p>미용샵에서 곧 확정 알림을 보내드립니다.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
